<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChessJEPA</title>
<link rel="stylesheet" href="/static/chessboard.min.css">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="app">

  <!-- ── Left: board ──────────────────────────────────────────────────── -->
  <div class="board-panel">

    <div class="board-header">
      <span class="logo">♟ ChessJEPA</span>
      <span id="thinkingDot" class="thinking-dot"></span>
    </div>

    <div id="board"></div>

    <div class="board-footer">
      <input id="fenInput" class="fen-input" readonly placeholder="FEN will appear here">
    </div>

    <div class="board-buttons">
      <button id="newGameBtn"   class="btn btn-primary">New Game</button>
      <button id="takeBackBtn"  class="btn btn-secondary">↩ Take Back</button>
      <button id="flipBoardBtn" class="btn btn-secondary">⇅ Flip</button>
    </div>

  </div>

  <!-- ── Right: settings + analysis ──────────────────────────────────── -->
  <div class="side-panel">

    <!-- Status card -->
    <div id="statusCard" class="status-card your-turn">
      <div class="status-left">
        <span id="statusIcon"  class="status-icon">♟</span>
        <div>
          <div id="statusTitle" class="status-title">Your Turn</div>
          <div id="statusSub"   class="status-sub">White to move</div>
        </div>
      </div>
      <span id="statusBadge" class="status-badge badge-playing">Playing</span>
    </div>

    <!-- Color + hints -->
    <div class="section-label">Play as</div>
    <div id="colorToggle" class="toggle-group">
      <button class="toggle-btn active" data-color="white">♔ White</button>
      <button class="toggle-btn"        data-color="black">♚ Black</button>
    </div>
    <div class="hints-row">
      <label class="hints-label" for="hintsToggle">Show legal move hints</label>
      <input id="hintsToggle" type="checkbox" checked>
    </div>

    <div class="divider"></div>

    <!-- ── JEPA Analysis ─────────────────────────────────────────────── -->
    <div class="section-label">JEPA Analysis</div>

    <div class="analysis-card">
      <div class="analysis-row">
        <span class="analysis-label">Best move</span>
        <span id="bestMoveSan" class="analysis-value best-move">—</span>
      </div>
      <div class="analysis-row">
        <span class="analysis-label">Confidence</span>
        <span id="confidencePct" class="analysis-value">—</span>
      </div>
      <div class="conf-bar-bg">
        <div id="confidenceBar" class="conf-bar-fill" style="width:0%"></div>
      </div>
    </div>

    <div class="section-label" style="margin-top:14px">Top moves</div>
    <div id="topMovesList" class="top-moves-list"></div>

    <div class="divider"></div>

    <!-- Move history -->
    <div class="section-label">Move History</div>
    <div id="moveHistory" class="move-history">
      <span class="history-empty">No moves yet</span>
    </div>

  </div>
</div>

<script src="/static/jquery.min.js"></script>
<script src="/static/chessboard.min.js"></script>
<script src="/static/chess.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
